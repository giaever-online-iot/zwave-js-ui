platforms:
  amd64:
  arm64:
  armhf:

apps:
  zwave-js-ui:
    daemon: simple
    restart-condition: always
    environment:
      STORE_DIR: $SNAP_DATA
      ZWAVEJS_EXTERNAL_CONFIG: $SNAP_DATA/.ext-config
      DAEMONIZED: 1
      npm_config_cache: /usr/local/share/.cache/npm
    command: lib/node_modules/zui-snap/node_modules/.bin/zwave-js-ui
    command-chain:
      - helper/env-wrapper
    plugs:
      - network
      - network-bind
      - raw-usb
      - serial-port
      - hardware-observe
      - log-observe
  exec:
    environment:
      STORE_DIR: $SNAP_DATA
      ZWAVEJS_EXTERNAL_CONFIG: $SNAP_DATA/.ext-config
      npm_config_cache: /usr/local/share/.cache/npm
    command: lib/node_modules/zui-snap/node_modules/.bin/zwave-js-ui
    command-chain:
      - helper/env-wrapper
    plugs:
      - network
      - network-bind
      - raw-usb
      - serial-port
      - hardware-observe
  help:
    command: helper/env-wrapper --help
  enable:
    command: bin/daemonize
  disable:
    command: bin/de-daemonize
  restart:
    command: bin/restart
  logs:
    command: bin/logs
    plugs:
      - log-observe
  backup:
    command: bin/backup
    plugs:
      - network
      - home
      - removable-media
      - gpg-public-keys
  backup-timer:
    command: bin/backup
    daemon: oneshot
    timer: "00:00"
    environment:
      DAEMONIZED: 1
    plugs:
      - network
      - home
      - removable-media

layout:
  # Cache is set to (env) something outside the rw mount, to prevent storing it inside the store dir.
  /usr/local/share/.cache/npm:
    bind: $SNAP/.cache/npm
  #/usr/local/share/.yarn: ?? Do we need this? Leave until proper testing is OK
    #symlink: $SNAP/lib/node_modules

slots: # ZUI offers new config dir within data (e.g for code-server snap)
  store-dir:
    interface: content
    content: vscs-content
    write:
      - $SNAP_DATA

parts:
  zwave-js-ui:
    after: [dependencies]
    build-environment:
      - DEBUG_BUILD: "false"
    build-snaps:
      - yq
    plugin: npm
    npm-include-node: true
    npm-node-version: 22.20.0
    source: src/node
    override-build: | # shell
      ZUIV="${SNAPCRAFT_PROJECT_VERSION#v}" yq -i '.version=env(ZUIV),.dependencies.zwave-js-ui=env(ZUIV)' -o=j "${CRAFT_PART_BUILD}/package.json"
      #cat "${CRAFT_PART_BUILD}/package.json"

      craftctl default

      #! Add extra debugging
      # if [ "${DEBUG_BUILD}" == true ]; then
      #   echo "DEBUG"
      #   echo "process.on(\"warning\", (warning) => { console.warn(\"Node.js warning: \" + warning.stack);});" >> "${CRAFT_PART_INSTALL}/lib/node_modules/zui-snap/node_modules/.bin/zwave-js-ui"
      # fi

    stage-packages:
      - on armhf:
        - libatomic1
    stage:
      - -bin/corepack
      - -bin/npx
      - -lib/node_modules/corepack
      - -lib/node_modules/npx

  dependencies:
    plugin: nil
    stage-snaps:
      - yq
    stage-packages:
      - udev
      - iproute2

  local:
    after: [dependencies]
    plugin: dump
    source: src/
    stage-packages:
      - uuid
    organize:
      hooks: snap/hooks

  backup-deps:
    plugin: nil
    # Tooling to pip-install duplicity at build time (and, on armhf — which has no
    # prebuilt wheel — compile its _librsync C extension against librsync-dev).
    build-packages:
      - build-essential
      - librsync-dev
      - python3-dev
      - python3-pip
      - python3-setuptools
      - python3-wheel
    # Runtime: the snap-staged interpreter (the core26 base ships no Python) plus
    # duplicity's runtime deps as archive debs — parity with the resolute duplicity
    # deb's Depends — and our supported backends (boto3/b2sdk; the google trio for
    # gdrive://, authenticated via backup.gdrive-credentials -> GOOGLE_SERVICE_JSON_FILE).
    stage-packages:
      - python3
      - gnupg
      - librsync2t64
      - python3-fasteners
      - python3-httplib2
      - python3-lxml
      - python3-paramiko
      - python3-pexpect
      - python3-psutil
      - python3-requests
      - python3-setuptools
      - python3-boto3
      - python3-b2sdk
      - python3-googleapi
      - python3-google-auth
      - python3-google-auth-oauthlib
    override-build: | # shell
      craftctl default
      # duplicity itself comes from PyPI, pinned + hash-locked, so every architecture
      # ships the SAME version (the archive deb would drift per-release and the
      # duplicity-team PPA builds amd64 only). --no-deps: its PyPI metadata hard-depends
      # on EVERY backend (~250 MB) — runtime deps are the curated debs above instead.
      # --no-build-isolation: the armhf sdist build uses the deb toolchain (resolute
      # setuptools 78.1.1 satisfies duplicity's >=78.1.0). --break-system-packages:
      # pip 25 applies PEP 668 even to --target installs into the part dir.
      # /usr/bin/python3 (build VM, has pip via build-packages) and NOT bare python3:
      # stage-packages are unpacked into CRAFT_PART_INSTALL before this scriptlet and
      # its usr/bin precedes /usr/bin on PATH, so bare python3 is the pip-less staged
      # interpreter. Same 3.14 either way — the cp314 wheel ABI matches the staged runtime.
      /usr/bin/python3 -m pip install \
        --no-deps --no-build-isolation --require-hashes --break-system-packages \
        --target "${CRAFT_PART_INSTALL}/usr/lib/python3/dist-packages" \
        --requirement "${CRAFT_PROJECT_DIR}/requirements-duplicity.txt"
    # Dead weight, excluded declaratively (cf. the zwave-js-ui part's stage list):
    # pip's console script carries a build-env shebang (the entry point is
    # `python3 -m duplicity`) and its data_files sit where nothing looks; the
    # googleapi discovery cache is ~100 MB of JSON for EVERY Google API — the
    # client falls back to network discovery for the one we use (drive v3),
    # which is fine for a job that exists to reach the network.
    stage:
      - -usr/lib/python3/dist-packages/bin
      - -usr/lib/python3/dist-packages/share
      - -usr/lib/python3/dist-packages/googleapiclient/discovery_cache/documents
      # NOTE: this part has no `source:`, so after editing requirements-duplicity.txt
      # run `snapcraft clean backup-deps` for local incremental rebuilds.
      # (Dead-weight removal lives in the declarative `stage:` exclusions below.)
