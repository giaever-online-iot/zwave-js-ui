name: Helper tests

# Guards the CI helpers (snap version/channel math; the retry-fetch remote-build
# wrapper). Runs only when a helper, its tests, or its fixtures change.
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/scripts/**'
      - '.github/workflows/helper-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Shellcheck the CI helpers + tests
        run: shellcheck .github/scripts/*.sh

      - name: Run helper unit tests
        run: |
          for t in .github/scripts/*.test.sh; do
            echo "== $t"
            bash "$t" || exit 1
          done
