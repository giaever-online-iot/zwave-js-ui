name: Release on merge

on:
  pull_request:
    types: [closed]
    branches: [main]
    # Mirror pr-build-snap's filter: a merge only has something to promote when
    # the PR built something (snap/, src/, or the pip requirements). Docs-only
    # merges skip entirely; the branch-has-revisions guard remains the backstop.
    paths:
      - 'snap/**'
      - 'src/**'
      - 'requirements-duplicity.txt'

permissions:
  contents: read

# Serialize ALL merge releases so two near-simultaneous merges can't race on the
# shared latest/* channels + default track. Never cancel an in-flight promotion.
concurrency:
  group: snap-release
  cancel-in-progress: false

env:
  SNAP_NAME: zwave-js-ui

jobs:
  promote:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Resolve version / track
        id: meta
        run: |
          set -euo pipefail
          V="$(yq '.version' snap/snapcraft.yaml)"
          TRACK="$(.github/scripts/snap-release.sh version-to-track "$V")"
          {
            echo "version=$V"
            echo "track=$TRACK"
            echo "pr=${{ github.event.pull_request.number }}"
          } >> "$GITHUB_OUTPUT"

      - name: Promote PR revisions to release channels
        run: |
          set -euo pipefail
          SR=.github/scripts/snap-release.sh
          SNAP="$SNAP_NAME"
          V="${{ steps.meta.outputs.version }}"
          TRACK="${{ steps.meta.outputs.track }}"
          PR="${{ steps.meta.outputs.pr }}"
          BRANCH="$TRACK/edge/$PR"

          INFO="$(snapcraft status "$SNAP")"

          if [ "$("$SR" branch-has-revisions "$TRACK" "$PR" <<<"$INFO")" != "yes" ]; then
            echo "::warning::release-on-merge: no revisions in $BRANCH to promote. If the build uploaded (see this PR's 'PR Build Snap' run), release them manually:"
            echo "  snapcraft promote $SNAP --from-channel $BRANCH --to-channel $TRACK/stable --yes"
            echo "  snapcraft promote $SNAP --from-channel $BRANCH --to-channel latest/candidate --yes   # if this is the newest release"
            echo "  snapcraft promote $SNAP --from-channel $BRANCH --to-channel latest/edge --yes"
            echo "  # or by revision: snapcraft revisions $SNAP  ->  snapcraft release $SNAP <rev> $TRACK/stable,latest/candidate,latest/edge"
            echo "  snapcraft set-default-track $SNAP $TRACK"
            exit 0
          fi

          CAND="$("$SR" channel-version latest/candidate <<<"$INFO")"
          echo "Merged $V; current latest/candidate=${CAND:-<none>}"

          # 1) Major bump: move previous major's final to latest/stable BEFORE candidate is overwritten.
          if [ "$("$SR" needs-stable-bump "$V" "$CAND")" = "yes" ]; then
            echo ">> major bump: latest/candidate -> latest/stable"
            snapcraft promote "$SNAP" --from-channel latest/candidate --to-channel latest/stable --yes
          fi

          # 2) The version track's own stable line (always; safe for backports).
          echo ">> $BRANCH -> $TRACK/stable"
          snapcraft promote "$SNAP" --from-channel "$BRANCH" --to-channel "$TRACK/stable" --yes

          # 3) Shared latest/* — promote each channel only if $V is >= that channel's OWN
          #    current version, so a backport can never downgrade a channel already ahead.
          EDGE="$("$SR" channel-version latest/edge <<<"$INFO")"
          TARGETS="$("$SR" latest-targets "$V" "$CAND" "$EDGE")"
          if [ -n "$TARGETS" ]; then
            for ch in $TARGETS; do
              echo ">> $BRANCH -> $ch"
              snapcraft promote "$SNAP" --from-channel "$BRANCH" --to-channel "$ch" --yes
            done
          else
            echo ">> backport ($V; candidate=${CAND:-<none>} edge=${EDGE:-<none>}): leaving latest/* unchanged"
          fi

          # 4) Close the PR branch (auto-expires anyway; this is tidy-up).
          echo ">> closing $BRANCH"
          snapcraft close "$SNAP" "$BRANCH" --yes || echo "close failed (already gone?); ignoring"

          # 5) Default track follows the merged line; never regresses or jumps to stray tracks.
          CAND_TRACK=""
          if [ -n "$CAND" ]; then CAND_TRACK="$("$SR" version-to-track "$CAND")"; fi
          if [ "$TRACK" != "$CAND_TRACK" ] && [ "$("$SR" is-at-least "$TRACK" "$CAND_TRACK")" = "yes" ]; then
            echo ">> set default track -> $TRACK"
            snapcraft set-default-track "$SNAP" "$TRACK"
          else
            echo ">> default track unchanged (line=${CAND_TRACK:-<none>})"
          fi
